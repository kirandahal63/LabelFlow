{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LabelFlow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

    <div class="login-container">
        <!-- Banner matching register page -->
        <div class="login-banner"></div>

        <!-- Login form card content overlaying the banner -->
        <div class="login-card">
            <h2 class="login-title">Welcome to LabelFlow</h2>

            <form id="loginForm">
                {% csrf_token %}

                <div class="mb-4">
                    <input type="email" id="email" class="form-control form-control-custom" placeholder="Email address"
                        required>
                </div>

                <div class="mb-4">
                    <input type="password" id="password" class="form-control form-control-custom" placeholder="Password"
                        required>
                </div>

                <!-- Checkbox matching the check styling in image -->
                <div class="form-check d-flex mb-4 gap-2" >
                    <input class="form-check-input form-check-input-custom me-2" type="checkbox" id="rememberMe"
                        checked>
                    <label class="form-check-label-custom" for="rememberMe">
                        Remember me
                    </label>
                </div>

                <div id="messageBox" class="mb-4"></div>

                <button type="submit" class="btn btn-custom-primary">
                    Sign In
                </button>

                <p class="divider-text"></p>

                <div class="social-buttons">
                    <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
                </div>

                <div class="register-link">
                    Don't have an account? <a href="/register/">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
            const messageBox = document.getElementById("messageBox");

            const data = {
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            messageBox.innerHTML = '';

            try {
                const response = await fetch("/api/login/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": csrfToken
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    messageBox.innerHTML = `
                <div class="alert alert-success">
                    ${result.message || "Login successful."}
                </div>
            `;
                    setTimeout(() => {
                        if (result.role === 'admin') {
                            window.location.href = "/admin-panel/";
                        } else {
                            window.location.href = "/";
                        }
                    }, 800);
                } else {
                    let errorMsg = "";
                    if (typeof result === "object") {
                        errorMsg = Object.entries(result)
                            .map(([key, val]) => `${key.replace('_', ' ')}: ${Array.isArray(val) ? val.join(', ') : val}`)
                            .join("<br>");
                    } else {
                        errorMsg = result.message || JSON.stringify(result);
                    }
                    messageBox.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i>Invalid credentials. Please try again.
                </div>
            `;
                }
            } catch (error) {
                messageBox.innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle me-2"></i> A server error occurred. Please try again.
            </div>
        `;
            }
        });
    </script>

</body>

</html>
