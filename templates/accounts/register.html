<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Register</title>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/8.5.0/mdb.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
</head>

<body>

    <!-- Section: Design Block -->
<section class="text-center">
  <!-- Background image -->
  <div class="p-5 bg-image" style="
        background-image: url('https://mdbootstrap.com/img/new/textures/full/171.jpg');
        height: 300px;
        "></div>
  <!-- Background image -->

  <div class="card mx-4 mx-md-5 shadow-5-strong bg-body-tertiary" style="
        margin-top: -100px;
        backdrop-filter: blur(30px);
        ">
    <div class="card-body py-5 px-md-5">

      <div class="row d-flex justify-content-center">
        <div class="col-lg-8">
          <h2 class="fw-bold mb-5">Sign up now</h2>
          <form id="registerForm">
            {% csrf_token %} 
            <!-- 2 column grid layout with text inputs for the first and last names -->
            <div class="row">
              <div class="col-md-6 mb-4">
                <div data-mdb-input-init class="form-outline">
                  <input type="text" id="first_name" class="form-control" />
                  <label class="form-label" for="first_name">First name</label>
                </div>
              </div>
              <div class="col-md-6 mb-4">
                <div data-mdb-input-init class="form-outline">
                  <input type="text" id="last_name" class="form-control" />
                  <label class="form-label" for="last_name">Last name</label>
                </div>
              </div>
            </div>

            <!-- Email input -->
            <div data-mdb-input-init class="form-outline mb-4">
              <input type="email" id="email" class="form-control" />
              <label class="form-label" for="email">Email address</label>
            </div>

            <!-- Password input -->
            <div data-mdb-input-init class="form-outline mb-4">
              <input type="password" id="password" class="form-control" />
              <label class="form-label" for="password">Password</label>
            </div>

            <div data-mdb-input-init class="form-outline mb-4">
  <input type="password" id="confirm_password" class="form-control" />
  <label class="form-label" for="confirm_password">Confirm Password</label>
</div>

            <!-- Checkbox -->
            <div class="form-check d-flex justify-content-center mb-4">
              <input class="form-check-input me-2" type="checkbox" value="" id="form2Example33" checked />
              <label class="form-check-label" for="form2Example33">
                Subscribe to our newsletter
              </label>
            </div>
            <div id="messageBox" class="mb-3"></div>
            <!-- Submit button -->
            <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-block mb-4">
              Sign up
            </button>

            <!-- Register buttons -->
            <div class="text-center">
              <p>or sign up with:</p>
              <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-link btn-floating mx-1">
                <i class="fab fa-facebook-f"></i>
              </button>

              <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-link btn-floating mx-1">
                <i class="fab fa-google"></i>
              </button>

              <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-link btn-floating mx-1">
                <i class="fab fa-twitter"></i>
              </button>

              <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-link btn-floating mx-1">
                <i class="fab fa-github"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- Section: Design Block -->
 

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/8.5.0/mdb.umd.min.js"></script>

    <script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // Get the CSRF token from the hidden input field Django just created
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    const data = {
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm_password").value
    };

    try {
        const response = await fetch("/api/register/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken // Include the token here
            },
            body: JSON.stringify(data)
        });
        // ... rest of your code

        const result = await response.json();

        if (response.ok) {
            messageBox.innerHTML = `
                <div class="alert alert-success">
                    ${result.message}
                </div>
            `;

            setTimeout(() => {
                window.location.href = "/login/";
            }, 1000);

        } else {
            messageBox.innerHTML = `
                <div class="alert alert-danger">
                    ${JSON.stringify(result)}
                </div>
            `;
        }

    } catch (error) {
        messageBox.innerHTML = `
            <div class="alert alert-danger">
                Server error
            </div>
        `;
    }
});
</script>

</body>
</html>
