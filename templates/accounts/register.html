{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LabelFlow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.15);
            --input-border-focus: #3b71ca;
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --primary-blue: #3b71ca;
            --primary-blue-hover: #305da8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 40px 0;
        }

        .signup-container {
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background-color: var(--card-bg);
        }

        /* Banner styling matching screenshot */
        .signup-banner {
            background-image: url("{% static 'images/signup_banner.png' %}");
            background-size: cover;
            background-position: center;
            height: 260px;
            position: relative;
        }

        /* Card container overlay with negative margin */
        .signup-card {
            background-color: var(--card-bg);
            padding: 40px 50px;
            margin-top: -60px;
            position: relative;
            border-radius: 16px 16px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .signup-title {
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 35px;
            text-align: center;
            color: var(--text-color);
        }

        /* Input styling */
        .form-control-custom {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color) !important;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }

        .form-control-custom:focus {
            background-color: rgba(255, 255, 255, 0.09);
            border-color: var(--input-border-focus);
            box-shadow: 0 0 0 4px rgba(59, 113, 202, 0.25);
            outline: none;
        }

        .form-control-custom::placeholder {
            color: var(--text-muted);
        }

        /* Styled label */
        .form-label-custom {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
            display: block;
        }

        /* Custom Checkbox */
        .form-check-input-custom {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            width: 18px;
            height: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .form-check-input-custom:checked {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .form-check-label-custom {
            font-size: 0.95rem;
            color: var(--text-color);
            cursor: pointer;
            user-select: none;
        }

        /* Custom Primary Button */
        .btn-custom-primary {
            background-color: var(--primary-blue);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 14px;
            border-radius: 8px;
            border: none;
            width: 100%;
            transition: all 0.25s ease;
            margin-bottom: 25px;
        }

        .btn-custom-primary:hover {
            background-color: var(--primary-blue-hover);
            transform: translateY(-1px);
        }

        .btn-custom-primary:active {
            transform: translateY(0);
        }

        /* Divider text */
        .divider-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-align: center;
        }

        /* Social buttons */
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 15px;
        }

        .social-btn {
            color: var(--text-color);
            font-size: 1.25rem;
            transition: color 0.2s, transform 0.2s;
            text-decoration: none;
        }

        .social-btn:hover {
            color: var(--primary-blue);
            transform: scale(1.15);
        }

        /* Alert styling */
        .alert {
            border-radius: 8px;
            font-size: 0.95rem;
            border: none;
        }

        .alert-success {
            background-color: rgba(40, 167, 69, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .alert-danger {
            background-color: rgba(220, 53, 69, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        /* Additional link back to login */
        .login-link {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        .login-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <!-- Banner matching screenshot top area -->
    <div class="signup-banner"></div>
    
    <!-- Sign up form card content overlaying the banner -->
    <div class="signup-card">
        <h2 class="signup-title">Sign Up</h2>
        
        <form id="registerForm">
            {% csrf_token %}
            
            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <input type="text" id="first_name" class="form-control form-control-custom" placeholder="First name" required>
                </div>
                <div class="col-md-6">
                    <input type="text" id="last_name" class="form-control form-control-custom" placeholder="Last name" required>
                </div>
            </div>
            
            <div class="mb-4">
                <input type="email" id="email" class="form-control form-control-custom" placeholder="Email address" required>
            </div>
            
            <div class="mb-4">
                <input type="password" id="password" class="form-control form-control-custom" placeholder="Password" required>
            </div>
            
            <div class="mb-4">
                <input type="password" id="confirm_password" class="form-control form-control-custom" placeholder="Confirm Password" required>
            </div>
            
            
            
            <div id="messageBox" class="mb-4"></div>
            
            <button type="submit" class="btn btn-custom-primary">
                Sign Up
            </button>
            
            <p class="divider-text">or sign up with:</p>
            
            <div class="social-buttons">
                <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
            </div>

            <div class="login-link">
                Already have an account? <a href="/login/">Log In</a>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    const messageBox = document.getElementById("messageBox");

    const data = {
        first_name: document.getElementById("first_name").value.trim(),
        last_name: document.getElementById("last_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm_password").value
    };

    messageBox.innerHTML = '';

    try {
        const response = await fetch("/api/register/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            messageBox.innerHTML = `
                <div class="alert alert-success">
                    <i class="fas fa-check-circle me-2"></i> ${result.message || "User registered successfully."}
                </div>
            `;
            setTimeout(() => {
                window.location.href = "/login/";
            }, 1500);
        } else {
            let errorMsg = "";
            if (typeof result === "object") {
                errorMsg = Object.entries(result)
                    .map(([key, val]) => `${key.replace('_', ' ')}: ${Array.isArray(val) ? val.join(', ') : val}`)
                    .join("<br>");
            } else {
                errorMsg = result;
            }
            messageBox.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i> ${errorMsg}
                </div>
            `;
        }
    } catch (error) {
        messageBox.innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle me-2"></i> A server error occurred. Please try again.
            </div>
        `;
    }
});
</script>

</body>
</html>
