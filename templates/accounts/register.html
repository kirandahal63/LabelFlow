{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LabelFlow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-container">
    <!-- Banner matching screenshot top area -->
    <div class="login-banner"></div>
    
    <!-- Sign up form card content overlaying the banner -->
    <div class="login-card">
        <h2 class="login-title">Sign Up</h2>
        
        <form id="registerForm">
            {% csrf_token %}
            
            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <input type="text" id="first_name" class="form-control form-control-custom" placeholder="First name" required>
                </div>
                <div class="col-md-6">
                    <input type="text" id="last_name" class="form-control form-control-custom" placeholder="Last name" required>
                </div>
            </div>
            
            <div class="mb-4">
                <input type="email" id="email" class="form-control form-control-custom" placeholder="Email address" required>
            </div>
            
            <div class="mb-4">
                <input type="password" id="password" class="form-control form-control-custom" placeholder="Password" required>
            </div>
            
            <div class="mb-4">
                <input type="password" id="confirm_password" class="form-control form-control-custom" placeholder="Confirm Password" required>
            </div>
            
            
            
            <div id="messageBox" class="mb-4"></div>
            
            <button type="submit" class="btn btn-custom-primary">
                Sign Up
            </button>
            
            
            
            <div class="social-buttons">
                <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
            </div>

            <div class="login-link">
                Already have an account? <a href="/login/">Log In</a>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    const messageBox = document.getElementById("messageBox");

    const data = {
        first_name: document.getElementById("first_name").value.trim(),
        last_name: document.getElementById("last_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm_password").value
    };

    messageBox.innerHTML = '';

    try {
        const response = await fetch("/api/register/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            messageBox.innerHTML = `
                <div class="alert alert-success">
                    ${result.message || "User registered successfully."}
                </div>
            `;
            setTimeout(() => {
                window.location.href = "/login/";
            }, 1500);
        } else {
            let errorMsg = "";
            if (typeof result === "object") {
                errorMsg = Object.entries(result)
                    .map(([key, val]) => `${key.replace('_', ' ')}: ${Array.isArray(val) ? val.join(', ') : val}`)
                    .join("<br>");
            } else {
                errorMsg = result;
            }
            messageBox.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i> Passwords do not match. Please try again.
                </div>
            `;
        }
    } catch (error) {
        messageBox.innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle me-2"></i> A server error occurred. Please try again.
            </div>
        `;
    }
});
</script>

</body>
</html>
