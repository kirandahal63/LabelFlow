{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Project - LabelFlow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --card-border: rgba(255, 255, 255, 0.05);
            --text-color: #e0e0e0;
            --text-muted: #888888;
            --primary-blue: #3b71ca;
            --primary-blue-hover: #305da8;
            --nav-bg: #1a1a1a;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        .navbar-custom {
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 30px;
        }

        .navbar-brand-custom {
            font-weight: 700;
            color: #fff !important;
            font-size: 1.4rem;
        }

        .container-custom {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card-custom {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .form-title {
            font-weight: 700;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-control-custom, .form-select-custom {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #fff !important;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .form-control-custom:focus, .form-select-custom:focus {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 113, 202, 0.25);
            outline: none;
        }

        .form-control-custom::placeholder {
            color: var(--text-muted);
        }

        .form-label-custom {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .btn-custom {
            background-color: var(--primary-blue);
            color: #fff;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            transition: all 0.2s;
            width: 100%;
            margin-top: 15px;
        }

        .btn-custom:hover {
            background-color: var(--primary-blue-hover);
        }

        .btn-custom-outline {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 500;
            border-radius: 8px;
            padding: 12px 24px;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            margin-top: 10px;
        }

        .btn-custom-outline:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: #fff;
        }

        .alert {
            border-radius: 8px;
            font-size: 0.95rem;
            border: none;
        }

        .alert-danger {
            background-color: rgba(220, 53, 69, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(220, 53, 69, 0.25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand navbar-brand-custom" href="/"><i class="fas fa-layer-group me-2"></i>LabelFlow</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="btn btn-custom-outline btn-sm py-2 px-3"><i class="fas fa-arrow-left me-1"></i> Back to Dashboard</a>
        </div>
    </div>
</nav>

<div class="container-custom">
    <div class="card-custom">
        <h2 class="form-title">Create New Project</h2>
        
        <form id="createProjectForm">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label-custom" for="name">Project Name</label>
                <input type="text" id="name" class="form-control form-control-custom" placeholder="e.g., Object Detection for Self-Driving Cars" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label-custom" for="description">Description</label>
                <textarea id="description" class="form-control form-control-custom" rows="4" placeholder="Describe the goal of this annotation project..."></textarea>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-6 mb-4 mb-md-0">
                    <label class="form-label-custom" for="status">Status</label>
                    <select id="status" class="form-select form-select-custom w-100">
                        <option value="draft">Draft</option>
                        <option value="active">Active</option>
                    </select>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label-custom" for="deadline">Deadline (Optional)</label>
                    <input type="date" id="deadline" class="form-control form-control-custom">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label-custom" for="label_set">Labels (Comma-separated)</label>
                <input type="text" id="label_set" class="form-control form-control-custom" placeholder="e.g., car, person, traffic light, pedestrian" required>
                <div class="form-text text-muted mt-2">Enter labels separated by commas. These will be used for image classification or bounding boxes.</div>
            </div>
            
            <div id="messageBox" class="mb-4"></div>
            
            <button type="submit" class="btn btn-custom">Create Project</button>
            <a href="/" class="btn btn-custom-outline">Cancel</a>
        </form>
    </div>
</div>

<script>
document.getElementById("createProjectForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    const messageBox = document.getElementById("messageBox");

    const name = document.getElementById("name").value.trim();
    const description = document.getElementById("description").value.trim();
    const statusVal = document.getElementById("status").value;
    const deadlineVal = document.getElementById("deadline").value || null;
    const labelsRaw = document.getElementById("label_set").value;

    // Convert comma-separated string to array
    const labelSet = labelsRaw.split(',')
        .map(label => label.trim())
        .filter(label => label.length > 0);

    const data = {
        name: name,
        description: description,
        status: statusVal,
        deadline: deadlineVal,
        label_set: labelSet
    };

    messageBox.innerHTML = '';

    try {
        const response = await fetch("/api/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            // Redirect to project detail view
            window.location.href = `/${result.id}/`;
        } else {
            let errorMsg = "";
            if (typeof result === "object") {
                errorMsg = Object.entries(result)
                    .map(([key, val]) => `${key.replace('_', ' ')}: ${Array.isArray(val) ? val.join(', ') : val}`)
                    .join("<br>");
            } else {
                errorMsg = result;
            }
            messageBox.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i> ${errorMsg}
                </div>
            `;
        }
    } catch (error) {
        messageBox.innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle me-2"></i> Server error. Could not create project.
            </div>
        `;
    }
});
</script>

</body>
</html>
